apiVersion: apps/v1
kind: Deployment
metadata:
  name: base-api
  namespace: chcooai-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: base-api
  template:
    metadata:
      labels:
        app: base-api
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/chcooai/base-api:latest
          command: ["npm", "run", "migration:run:prod"]
          env:
            - name: DB_HOST
              value: base-mysql
            - name: DB_PORT
              value: "3306"
            - name: DB_USERNAME
              value: base
            - name: DB_NAME
              value: base
          envFrom:
            - secretRef:
                name: base-env
      containers:
        - name: base-api
          image: ghcr.io/chcooai/base-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: base-mysql
            - name: DB_PORT
              value: "3306"
            - name: DB_USERNAME
              value: base
            - name: DB_NAME
              value: base
            - name: AUTH_COOKIE_DOMAIN
              value: chcooai.com
            - name: AUTH_COOKIE_SECURE
              value: "true"
          envFrom:
            - secretRef:
                name: base-env
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: base-api
  namespace: chcooai-prod
spec:
  selector:
    app: base-api
  ports:
    - port: 3000
      targetPort: 3000
